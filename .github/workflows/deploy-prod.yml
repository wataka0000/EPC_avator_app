name: deploy-prod

on:
  workflow_dispatch:
    inputs:
      release_note:
        description: "Short release note for this production deployment"
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Show release context
        run: |
          echo "Production release note:"
          echo "${{ github.event.inputs.release_note }}"

      - name: Placeholder deployment step
        run: |
          echo "Replace this with your production deploy command."
          echo "Use environment protection rules for required reviewers."
